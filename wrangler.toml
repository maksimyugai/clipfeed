name = "clipfeed"
main = "dist/api/index.js"
compatibility_date = "2026-07-01"

# Disables the default *.workers.dev route once a custom domain is attached
# (dashboard-side — see README "Deploy your own (fork)"; this repo never
# hardcodes a fork's actual domain). Not a security boundary by itself — the
# Access-JWT middleware in access-middleware.ts already fails closed on every
# /api/admin/* route regardless of which hostname the request arrives on —
# but it does remove a second, unnecessary public entry point to the same
# Worker once you have a real domain. Safe to flip back to `true` (or delete
# the line) for a fork that hasn't set up a custom domain yet.
workers_dev = false
preview_urls = true

[vars]
SUMMARY_MODEL = "claude-haiku-4-5-20251001"
DAILY_SUMMARY_LIMIT = 80
WORKERS_AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
TURNSTILE_SITE_KEY = "0x4AAAAAAD5FSIrh2Xu_PuNh"
PUBLIC_BASE_URL = ""
PENDING_TIMEOUT_MIN = 10
INTEREST_TOPICS = "AI/LLMs and their engineering; computer hardware — CPUs, GPUs, NVIDIA/Intel/AMD, chips; Linux — kernel, distributions, open source ecosystem; software development and programming languages; Cloudflare and edge computing; security; notable science/tech news"
AGENT_HOUR_UTC = "5"
DIGEST_HOUR_UTC = "6"
# How many candidates the agent saves per run. String, parsed defensively
# (1-20, else this default with a warning) — see README "Daily scraping
# agent".
AGENT_DAILY_PICKS = "10"
# How much summary you want to read: the target TOTAL body length in
# characters (all paragraphs, per language). Prompt and validation both
# derive their numbers from this one setting (see summarize.ts's
# deriveSummarySpec) — string, not a number, so a bad override (missing,
# non-numeric, outside [400, 4000]) degrades to the 800 default instead of
# breaking. See README "Summary length".
SUMMARY_BODY_TARGET_CHARS = "800"

# Faithfulness check (see packages/api/src/faithfulness.ts, README
# "Faithfulness check"): a SEPARATE judge pass, always Workers AI Llama
# regardless of which model wrote the summary, that verifies a summary
# against its source after it validates but before the article is marked
# ready. FAITHFULNESS_CHECK enabled by default (only the literal "false"
# disables it); FAITHFULNESS_ENFORCE stays "false" (soft/signal-only) —
# a 'fail' verdict is stored and shown as a badge but never blocks the
# article until you've watched real false-positive rates and flip this to
# "true", at which point a 'fail' triggers one resummarize retry, with a
# permanent discard if that retry still fails.
FAITHFULNESS_CHECK = "true"
FAITHFULNESS_ENFORCE = "false"
FAITHFULNESS_JUDGE_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

# Embeddings — semantic dedup (agent-pool.ts) + semantic search
# (GET /api/search, README "Semantic dedup & search"). bge-m3: Workers AI's
# multilingual embedding model (100+ languages, including our ru/en
# summaries), 1024 dimensions, cosine metric — matches the Vectorize index
# below exactly (see embeddings.ts's dimension-mismatch guard). Threshold
# and candidate cap were tuned against real production data — see README
# for the derivation and the honest "best-effort" caveat.
EMBEDDING_MODEL = "@cf/baai/bge-m3"
SEMANTIC_DEDUP_MAX_CANDIDATES = "40"
SEMANTIC_DEDUP_THRESHOLD = "0.82"
SEARCH_RATE_PER_MIN = "30"

[ai]
binding = "AI"

# Provisioned by `deno task setup` (or `wrangler vectorize create
# clipfeed-embeddings --dimensions=1024 --metric=cosine`) — optional at
# runtime: a fork that hasn't run setup yet simply has no VECTORS binding,
# and every call site degrades gracefully (semantic dedup skips its layer,
# search falls back to the existing LIKE query) rather than crashing. See
# embeddings.ts.
[[vectorize]]
binding = "VECTORS"
index_name = "clipfeed-embeddings"

# Single hourly cron, dispatched by UTC hour to whichever of the two daily
# jobs below is configured for it (see packages/api/src/scheduled.ts) — an
# empty or invalid AGENT_HOUR_UTC/DIGEST_HOUR_UTC disables that job:
#   - AGENT_HOUR_UTC (default 5): the scraping agent (see README "Daily
#     scraping agent").
#   - DIGEST_HOUR_UTC (default 6, after the agent so its picks are already
#     in by digest time — though the digest covers the last 24h regardless
#     of order, so either order works): the Telegram morning digest, sent
#     when TELEGRAM_* secrets are set (see README "Telegram bot").
# Both are always UTC, unaffected by your own timezone.
[triggers]
crons = ["0 * * * *"]

[assets]
directory = "./dist/web"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "clipfeed"
database_id = "44591469-9b64-48e4-8799-0330f5f8382e"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8e4fddfbda204322a609830cc771124f"

# Article pipeline execution (fetch -> extract -> summarize -> persist) runs
# in the queue consumer below, not in the request handler's ctx.waitUntil()
# — that has a hard 30-second cap after the response is sent, and large
# articles' Workers AI summarization calls have been measured well past
# that (see README "Queue-based pipeline execution"). A consumer invocation
# gets minutes of wall time instead. max_batch_size = 1 keeps one article
# per invocation, so one slow summarization never blocks another queued
# article's budget.
#
# dead_letter_queue = "clipfeed-dlq": the pipeline itself guarantees a
# terminal 'ready'/'failed' row ONLY once the consumer actually runs it
# (see pipeline.ts) — a message that's silently dropped before that ever
# happens (delivery never reaching a consumer invocation, or an infra-level
# failure exhausting max_retries) previously left the article stuck
# 'pending' until the sweeper's timeout, with no record of what happened.
# The DLQ consumer below (same Worker, see index.ts's `queue` export)
# closes that gap: it terminal-fails the referenced article directly, so no
# queue path can leave a row non-terminal regardless of the failure
# mechanism.
#
# Neither queue is provisioned by this config — a forker runs
# `deno task setup` once (or `wrangler queues create clipfeed-jobs` +
# `wrangler queues create clipfeed-dlq`) before their first deploy. If the
# JOBS binding isn't available (queue missing, or any environment that
# hasn't set this up), the app falls back to the pre-Queues
# ctx.waitUntil() behavior — see queue.ts's enqueueArticleJob.
[[queues.producers]]
binding = "JOBS"
queue = "clipfeed-jobs"

# max_concurrency = 3 (added after a burst investigation — see README
# "Queue-based pipeline execution"/CLAUDE.md task history): the daily agent
# job enqueues up to AGENT_DAILY_PICKS messages in a tight loop, all landing
# in the queue within milliseconds of each other. Left unset, Cloudflare
# auto-scales how many consumer invocations run concurrently to drain a
# sudden backlog, and a live burst of 10 showed at least two messages only
# succeeding on their second delivery attempt — consistent with (though not
# conclusively proven to be caused by) invocation contention under a sudden
# spike of concurrent consumer invocations. Capping concurrency is a cheap,
# reversible, latency-insensitive mitigation for a background job either
# way; the existing terminal-state guarantee + DLQ consumer + healing sweep
# already fully bound the downside even if this isn't the actual cause.
[[queues.consumers]]
queue = "clipfeed-jobs"
max_batch_size = 1
max_retries = 2
max_batch_timeout = 5
max_concurrency = 3
dead_letter_queue = "clipfeed-dlq"

[[queues.consumers]]
queue = "clipfeed-dlq"
max_batch_size = 10
max_retries = 3

# invocation_logs writes one line per request; lower head_sampling_rate if
# public traffic grows.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
