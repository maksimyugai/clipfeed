name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.1"

      # Task 41 Part E: caps resident memory for fmt/lint so a future huge
      # vendored asset (accidentally outside deno.json's exclude patterns)
      # can't OOM the runner. `ulimit -v` doesn't work here -- V8 reserves a
      # large virtual address space on startup regardless of actual usage,
      # so it kills `deno` immediately rather than only under real memory
      # pressure. The wrapper script polls actual RSS instead; see its
      # header comment for the local repro that proved a ~500MB-plus valid
      # JS file drives deno fmt's peak RSS into double-digit GB.
      - name: Format check
        run: ./scripts/ci/run-with-memory-limit.sh 512 -- deno fmt --check

      - name: Lint
        run: ./scripts/ci/run-with-memory-limit.sh 512 -- deno lint

      - name: Test
        run: deno task test

      - name: Build
        run: deno task build

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Required so the action can call the GitHub API to resolve the PR's
          # commit range; the default per-run token already has read access,
          # no separate secret needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # No GITLEAKS_LICENSE needed — that's only required for private repos.
