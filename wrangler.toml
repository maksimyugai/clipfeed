name = "clipfeed"
main = "dist/api/index.js"
compatibility_date = "2026-07-01"

[vars]
SUMMARY_MODEL = "claude-haiku-4-5-20251001"
DAILY_SUMMARY_LIMIT = 50
WORKERS_AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
TURNSTILE_SITE_KEY = "0x4AAAAAAD5FSIrh2Xu_PuNh"
PUBLIC_BASE_URL = ""
PENDING_TIMEOUT_MIN = 10

[ai]
binding = "AI"

# Morning digest, sent via the Telegram bot when TELEGRAM_* secrets are set
# (see README "Telegram bot") — 03:00 UTC by default; edit the cron
# expression below to change the time (it's always UTC, unaffected by your
# own timezone).
[triggers]
crons = ["0 3 * * *"]

[assets]
directory = "./dist/web"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "clipfeed"
database_id = "44591469-9b64-48e4-8799-0330f5f8382e"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "8e4fddfbda204322a609830cc771124f"
